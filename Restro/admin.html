<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicious Restaurant - Admin Panel</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --primary-red: #e63946;
            --text-light: #f1faee;
            --text-muted: #a8dadc;
            --font-sans: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--text-light); font-family: var(--font-sans); padding: 30px 5%; }
        h1 { font-size: 2rem; margin-bottom: 5px; }
        h1 span { color: var(--primary-red); }
        .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            padding: 10px 24px; border-radius: 10px; border: 1px solid #333;
            background: transparent; color: var(--text-light); font-size: 0.9rem;
            cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .tab-btn:hover { border-color: var(--primary-red); color: var(--primary-red); }
        .tab-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }
        .refresh-btn {
            margin-left: auto; padding: 10px 20px; border-radius: 10px;
            background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #4caf50;
            cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .refresh-btn:hover { background: #4caf50; color: white; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card {
            background: var(--bg-card); border-radius: 12px; padding: 20px 30px;
            border: 1px solid #2a2a2a; min-width: 180px;
        }
        .stat-card h3 { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary-red); }
        table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        th { background: #2a2a2a; padding: 14px 16px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        td { padding: 12px 16px; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; vertical-align: top; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .badge-placed { background: rgba(255,193,7,0.2); color: #ffc107; }
        .badge-preparing { background: rgba(33,150,243,0.2); color: #2196f3; }
        .badge-delivered { background: rgba(76,175,80,0.2); color: #4caf50; }
        .location-cell { max-width: 250px; font-size: 0.8rem; color: var(--text-muted); word-break: break-word; }
        .items-cell { font-size: 0.8rem; }
        .items-cell li { margin-bottom: 3px; }
        .empty-msg { text-align: center; padding: 60px; color: var(--text-muted); font-size: 1.1rem; }
        .json-view { background: #0a0a0a; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; max-height: 300px; overflow-y: auto; color: var(--text-muted); border: 1px solid #2a2a2a; margin-top: 10px; }
        .hidden { display: none; }
        .clear-btn { background: rgba(230,57,70,0.15); border: 1px solid var(--primary-red); color: var(--primary-red); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 0.85rem; margin-top: 20px; transition: all 0.3s; }
        .clear-btn:hover { background: var(--primary-red); color: white; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Delicious <span>Restaurant</span> — Admin Panel</h1>
    <p class="subtitle">Local Database (IndexedDB) Viewer</p>

    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('users')">Users</button>
        <button class="tab-btn" onclick="switchTab('orders')">Orders</button>
        <button class="tab-btn" onclick="switchTab('cart')">Cart Items</button>
        <button class="tab-btn" onclick="switchTab('raw')">Raw JSON</button>
        <button class="refresh-btn" onclick="loadAll()">Refresh</button>
    </div>

    <!-- Users Tab -->
    <div id="usersTab">
        <div class="section-header">
            <h2>All Registered Users</h2>
        </div>
        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <!-- Orders Tab -->
    <div id="ordersTab" class="hidden">
        <div class="section-header">
            <h2>All Orders</h2>
        </div>
        <table id="ordersTable">
            <thead>
                <tr>
                    <th>Order #</th>
                    <th>User</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Location</th>
                    <th>Coordinates</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
        </table>
    </div>

    <!-- Cart Tab -->
    <div id="cartTab" class="hidden">
        <div class="section-header">
            <h2>All Cart Items</h2>
            <button class="clear-btn" onclick="clearCart()">Clear All Cart Items</button>
        </div>
        <table id="cartTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>User ID</th>
                    <th>Item ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="cartBody"></tbody>
        </table>
    </div>

    <!-- Raw JSON Tab -->
    <div id="rawTab" class="hidden">
        <div class="section-header">
            <h2>Raw Database Dump</h2>
            <button class="clear-btn" onclick="clearAllDB()">Delete All Data</button>
        </div>
        <div class="json-view" id="rawJson"></div>
    </div>

    <script src="Frontend/db.js"></script>
    <script>
        let allData = {};

        async function loadAll() {
            await DB.init();
            const users = await DB.getAll('users');
            const orders = await DB.getAll('orders');
            const cart = await DB.getAll('cart');

            allData = { users, orders, cart };

            // Stats
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><h3>Users</h3><div class="stat-value">${users.length}</div></div>
                <div class="stat-card"><h3>Orders</h3><div class="stat-value">${orders.length}</div></div>
                <div class="stat-card"><h3>Cart Items</h3><div class="stat-value">${cart.length}</div></div>
                <div class="stat-card"><h3>Revenue</h3><div class="stat-value">$${orders.reduce((s,o) => s + o.total, 0).toFixed(2)}</div></div>
            `;

            // Users table
            document.getElementById('usersBody').innerHTML = users.length === 0
                ? '<tr><td colspan="5" class="empty-msg">No users registered yet.</td></tr>'
                : users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td><strong>${u.name}</strong></td>
                        <td>${u.email}</td>
                        <td style="color:var(--text-muted)">${u.password}</td>
                        <td>${new Date(u.createdAt).toLocaleString()}</td>
                    </tr>
                `).join('');

            // Orders table
            document.getElementById('ordersBody').innerHTML = orders.length === 0
                ? '<tr><td colspan="8" class="empty-msg">No orders placed yet.</td></tr>'
                : orders.map(o => `
                    <tr>
                        <td><strong>#${o.id}</strong></td>
                        <td>${o.userName}<br><small style="color:var(--text-muted)">${o.userEmail}</small></td>
                        <td class="items-cell"><ul>${o.items.map(i => `<li>${i.name} x${i.quantity} ($${i.subtotal.toFixed(2)})</li>`).join('')}</ul></td>
                        <td><strong>$${o.total.toFixed(2)}</strong></td>
                        <td class="location-cell">${o.location.address}</td>
                        <td style="font-family:monospace;font-size:0.8rem">${o.location.latitude.toFixed(6)}, ${o.location.longitude.toFixed(6)}</td>
                        <td><span class="badge badge-${o.status}">${o.status.toUpperCase()}</span></td>
                        <td>${new Date(o.date).toLocaleString()}</td>
                    </tr>
                `).join('');

            // Cart table
            document.getElementById('cartBody').innerHTML = cart.length === 0
                ? '<tr><td colspan="6" class="empty-msg">No items in any cart.</td></tr>'
                : cart.map(c => `
                    <tr>
                        <td>${c.id}</td>
                        <td>${c.userId}</td>
                        <td>${c.itemId}</td>
                        <td>${c.name}</td>
                        <td>$${c.price.toFixed(2)}</td>
                        <td>${c.quantity}</td>
                    </tr>
                `).join('');

            // Raw JSON
            document.getElementById('rawJson').textContent = JSON.stringify(allData, null, 2);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('usersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('ordersTab').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('cartTab').classList.toggle('hidden', tab !== 'cart');
            document.getElementById('rawTab').classList.toggle('hidden', tab !== 'raw');
        }

        async function clearCart() {
            if (confirm('Delete all cart items?')) {
                await DB.clearStore('cart');
                loadAll();
            }
        }

        async function clearAllDB() {
            if (confirm('Delete ALL data (users, orders, cart)? This cannot be undone!')) {
                await DB.clearStore('users');
                await DB.clearStore('orders');
                await DB.clearStore('cart');
                loadAll();
            }
        }

        loadAll();
    </script>
</body>
</html>
