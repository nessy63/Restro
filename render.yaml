services:
  - type: static
    name: delicious-restaurant
    runtime: static
    buildCommand: ./build.sh
    staticPublishPath: ./Restro
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
